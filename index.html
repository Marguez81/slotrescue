<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SlotRescue – Fill cancelled appointments automatically</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="SlotRescue automatically fills cancelled appointments by offering free slots to existing customers, so your diary stays full without extra admin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-page: #020617;
      --bg-hero: radial-gradient(circle at top left, #1d4ed8 0, #020617 45%);
      --bg-surface: #020617;
      --border-subtle: rgba(148, 163, 184, 0.3);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --primary: #6366f1;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --shadow-soft: 0 22px 45px rgba(15, 23, 42, 0.9);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
      background: var(--bg-page);
      line-height: 1.6;
    }

    a {
      color: var(--text-main);
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    .page-shell {
      min-height: 100vh;
      background:
        radial-gradient(circle at 0 0, rgba(129, 140, 248, 0.18) 0, transparent 45%),
        radial-gradient(circle at 100% 0, rgba(56, 189, 248, 0.14) 0, transparent 45%);
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 1.5rem;
    }

    /* HEADER */

    header.site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.96);
      border-bottom: 1px solid rgba(51, 65, 85, 0.8);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0;
    }

    .logo-text-only {
      font-weight: 700;
      letter-spacing: -0.04em;
      font-size: 1.25rem;
    }

    nav.nav {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      font-size: 0.9rem;
    }

    .nav a { color: #9ca3af; }

    .nav a:hover { color: #e5e7eb; }

    .nav-cta {
      padding: 0.45rem 1rem;
      border-radius: 999px;
      border: 1px solid rgba(156, 163, 175, 0.7);
      background: radial-gradient(circle at top left, rgba(148, 163, 253, 0.25), rgba(15, 23, 42, 0.98));
      color: #e5e7eb;
      font-weight: 500;
      text-decoration: none;
    }

    .nav-cta:hover {
      border-color: #e5e7eb;
      text-decoration: none;
    }

    main { padding-bottom: 4rem; }

    /* HERO */

    .hero {
      background: var(--bg-hero);
      padding: 3.6rem 0 3rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.05fr);
      gap: 2.8rem;
      align-items: center;
    }

    .eyebrow {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: #a5b4fc;
      font-weight: 600;
      margin: 0 0 0.7rem;
    }

    h1 {
      font-size: 2.5rem;
      line-height: 1.05;
      margin: 0 0 1rem;
      letter-spacing: -0.05em;
    }

    .lead {
      font-size: 1.02rem;
      color: #cbd5f5;
      max-width: 36rem;
      margin: 0 0 1.7rem;
    }

    .hero-cta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0.75rem 1.6rem;
      border: none;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
    }

    .btn-primary {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      color: #e5e7eb;
      box-shadow: var(--shadow-soft);
    }

    .btn-primary:hover { filter: brightness(1.04); }

    .hero-note {
      font-size: 0.86rem;
      color: #cbd5f5;
    }

    .hero-panel {
      background: rgba(15, 23, 42, 0.96);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 1.25rem 1.1rem;
      border: 1px solid rgba(148, 163, 253, 0.35);
    }

    .hero-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .hero-panel-title {
      font-weight: 500;
      color: #e5e7eb;
    }

    .hero-panel-tag {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      font-weight: 500;
      border: 1px solid rgba(34, 197, 94, 0.4);
    }

    .sms-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      font-size: 0.86rem;
    }

    .sms-item {
      background: rgba(15, 23, 42, 1);
      border-radius: 0.9rem;
      padding: 0.6rem 0.7rem;
      border: 1px solid rgba(148, 163, 184, 0.45);
    }

    .sms-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-bottom: 0.1rem;
    }

    /* SECTIONS + ANIMAZIONE */

    .section {
      padding: 3.2rem 0 2.8rem;
      background: var(--bg-surface);
    }

    .section-inner {
      max-width: 780px;
      margin: 0 auto;
    }

    h2 {
      font-size: 1.6rem;
      margin: 0 0 0.6rem;
      letter-spacing: -0.03em;
    }

    .section-intro {
      margin: 0 0 1.8rem;
      color: var(--text-muted);
      font-size: 0.97rem;
    }

    .fade-section {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }

    .fade-section--visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* FEATURE LIST */

    .feature-list {
      display: flex;
      flex-direction: column;
      gap: 1.4rem;
    }

    .feature {
      display: grid;
      grid-template-columns: 0.55fr 1.45fr;
      gap: 1.25rem;
      padding: 1rem 0;
      border-top: 1px solid rgba(148, 163, 184, 0.35);
    }

    .feature:last-child {
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
    }

    .feature-title {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .feature-body {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* STEPS */

    .steps-line {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .steps-line li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.9rem;
      align-items: flex-start;
    }

    .steps-label {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .steps-text {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .steps-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .steps-body {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* PRICING */

    .pricing-shell {
      display: grid;
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
      gap: 1.8rem;
      align-items: flex-start;
    }

    .pricing-copy {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .pricing-card {
      background: #020617;
      border-radius: var(--radius-lg);
      padding: 1.3rem 1.2rem;
      border: 1px solid rgba(129, 140, 248, 0.8);
      box-shadow: var(--shadow-soft);
    }

    .pricing-card h3 {
      margin: 0 0 0.5rem;
      font-size: 0.98rem;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
      margin-bottom: 0.35rem;
    }

    .price {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .price-unit {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .pricing-detail {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-block;
      margin-top: 0.3rem;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: rgba(99, 102, 241, 0.18);
      color: #e5e7ff;
      font-weight: 500;
    }

    .note {
      font-size: 0.86rem;
      color: var(--text-muted);
      margin-top: 0.75rem;
    }

    .section-contact p {
      margin: 0.5rem 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* FOOTER */

    footer.site-footer {
      border-top: 1px solid rgba(30, 41, 59, 0.9);
      background: #020617;
      padding: 1.5rem 0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    footer.site-footer a {
      color: var(--text-muted);
    }

    footer.site-footer a:hover {
      color: #e5e7eb;
    }

    @media (max-width: 768px) {
      .hero-grid {
        grid-template-columns: minmax(0, 1fr);
      }

      .hero {
        padding: 2.7rem 0 2.4rem;
      }

      nav.nav { display: none; }

      .feature {
        grid-template-columns: minmax(0, 1fr);
      }

      .pricing-shell
