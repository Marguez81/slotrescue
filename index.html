<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SlotRescue — Fill cancelled appointments automatically</title>

  <!-- Inter per body, Manrope per titoli/wordmark -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      /* Palette blu/rosso, neutra sullo sfondo */
      --bg: #f3f4f6;
      --primary: #0f60ff;      /* blu principale */
      --primary-soft: rgba(15,96,255,0.12);
      --accent: #ef4444;       /* rosso accent */
      --accent-soft: rgba(239,68,68,0.14);
      --text: #020617;
      --muted: #6b7280;
      --card: #ffffff;
      --border-subtle:#e5e7eb;
      --radius-lg: 18px;
      --shadow-soft: 0 18px 40px rgba(15,23,42,0.12);
      --shadow-card: 0 10px 28px rgba(15,23,42,0.06);
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15,96,255,0.08), transparent 55%),
        radial-gradient(circle at 80% 0, rgba(239,68,68,0.08), transparent 55%),
        #f9fafb;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
    }

    a{text-decoration:none;color:inherit;}

    .page{min-height:100vh;display:flex;flex-direction:column;}
    .container{max-width:1120px;margin:0 auto;padding:26px 20px 80px;}

    /* NAV */
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .nav-left{
      display:flex;
      align-items:flex-end;
      gap:6px;
    }

    .wordmark{
      font-family:Manrope, system-ui, sans-serif;
      font-weight:800;
      font-size:26px; /* più grande */
      letter-spacing:0.03em;
      display:inline-flex;
      align-items:baseline;
      gap:3px;
      cursor:default;
      user-select:none;
    }

    .wordmark span:first-child{color:var(--primary);}
    .wordmark span:last-child{color:var(--accent);}

    .tm{
      font-size:11px;
      color:#9ca3af;          /* colore neutro, non blu/rosso */
      position:relative;
      top:-4px;
    }

    .nav-links{
      display:flex;
      align-items:center;
      gap:24px;
      font-size:14px;
      font-weight:500;
      color:#6b7280;
    }

    .nav-links a:hover{color:var(--text);}

    .nav-pill{
      padding:8px 14px;
      border-radius:999px;
      border:1px solid var(--border-subtle);
      background:rgba(255,255,255,0.9);
      font-size:13px;
    }

    /* HERO */
    .hero{
      display:grid;
      grid-template-columns:minmax(0,1.1fr) minmax(0,1fr);
      gap:64px;
      align-items:center;
      padding-top:70px;
    }

    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:5px 11px;
      border-radius:999px;
      border:1px solid var(--border-subtle);
      background:rgba(255,255,255,0.9);
      color:#4b5563;
      font-size:12px;
      font-weight:500;
      margin-bottom:14px;
      animation:fadeInUp .5s ease-out both;
    }

    .eyebrow-dot{
      width:8px;height:8px;border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 0 5px var(--accent-soft);
    }

    h1{
      font-family:Manrope, system-ui, sans-serif;
      font-size:48px;
      line-height:1.05;
      letter-spacing:-0.04em;
      margin:0 0 16px;
      animation:fadeInUp .6s ease-out .04s both;
    }

    h1 span{color:var(--primary);}

    .hero p{
      font-size:17px;
      color:var(--muted);
      max-width:440px;
      margin:0 0 24px;
      animation:fadeInUp .65s ease-out .08s both;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:14px;
      margin-bottom:12px;
      animation:fadeInUp .68s ease-out .12s both;
    }

    .btn-primary{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:13px 26px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--primary),#0b4bd1);
      color:#fff;
      font-weight:600;
      font-size:14px;
      box-shadow:0 14px 30px rgba(15,96,255,0.45);
      transition:transform .12s ease-out, box-shadow .12s ease-out;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 18px 40px rgba(15,96,255,0.52);
    }

    .btn-ghost{
      font-size:14px;
      color:#4b5563;
      font-weight:500;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .btn-ghost::after{content:"→";font-size:14px;}

    .hero-sub{
      font-size:13px;
      color:var(--muted);
      animation:fadeInUp .7s ease-out .16s both;
    }

    /* PREVIEW */
    .preview{
      background:var(--card);
      border-radius:var(--radius-lg);
      padding:20px 20px 18px;
      box-shadow:var(--shadow-card);
      border:1px solid var(--border-subtle);
      position:relative;
      overflow:hidden;
      animation:floatIn .6s ease-out .12s both;
    }

    .preview-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:14px;
      font-size:13px;
      color:#111827;
      font-weight:500;
    }

    .preview-pill{
      padding:5px 9px;
      border-radius:999px;
      background:rgba(15,96,255,0.06);
      font-size:11px;
      color:#0b4bd1;
    }

    .preview-rows{padding-top:4px;}

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:9px 11px;
      border-radius:10px;
      margin-bottom:7px;
      font-size:13px;
      opacity:0;
      transform:translateY(6px);
      animation:rowIn .45s ease-out forward
